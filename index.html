<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Faris Fadil Arifin - Data Scientist and Data Analyst portfolio.">
  <title>Faris Fadil Arifin - Data Scientist / Data Analyst Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="deck-viewport" aria-label="Data science portfolio presentation">
    <div class="deck-stage" id="deckStage"></div>
  </main>

  <nav class="deck-controls" aria-label="Portfolio navigation">
    <button class="control-button" id="prevBtn" type="button" aria-label="Previous slide">Prev</button>
    <div class="progress-shell" aria-hidden="true">
      <span class="progress-fill" id="progressFill"></span>
    </div>
    <span class="slide-counter" id="slideCounter">1 / 12</span>
    <button class="control-button" id="nextBtn" type="button" aria-label="Next slide">Next</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
